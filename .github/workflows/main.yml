name: Update Coin List

on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分鐘執行一次
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests pandas pytz
        
      - name: Run scraper
        run: python update_coins.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html hot_symbols.txt
          git commit -m "Auto update coins - Taiwan Time" || exit 0
          git push
